{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
.block-header {
    background: linear-gradient(135deg, #0f1b33 0%, #1a365d 50%, #0f1b33 100%);
    position: relative;
    overflow: hidden;
}
.block-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url('{% static "images/"|add:campus.images.0 %}') center/cover no-repeat;
    opacity: 0.1;
}
.gallery-img {
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer;
    position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}
.gallery-img:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 16px 50px rgba(0,0,0,0.15);
}
.gallery-img img {
    transition: all 0.6s;
    display: block;
}
.gallery-img:hover img {
    transform: scale(1.08);
}
.gallery-img .img-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    padding: 1rem;
    color: #fff;
    font-weight: 600;
    font-size: 0.85rem;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s;
}
.gallery-img:hover .img-label {
    opacity: 1;
    transform: translateY(0);
}
.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 20px;
    border-radius: 50px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    transition: all 0.3s;
}
.back-btn:hover {
    background: rgba(255,255,255,0.2);
    color: #fff;
}
</style>

<!-- Header -->
<section class="block-header py-5">
    <div class="container position-relative z-1">
        <a href="{% url 'college:home' %}" class="back-btn mb-4"><i class="bi bi-arrow-left"></i> Back to Home</a>
        <div class="row align-items-center">
            <div class="col-lg-8 text-white">
                <span class="badge {{ campus.badge_class }} px-3 py-2 mb-3" style="font-size: 0.85rem;">{{ campus.badge }}</span>
                <h1 class="display-4 fw-bold mb-2">{{ campus.title }}</h1>
                <p class="lead mb-0" style="color: rgba(255,255,255,0.7); font-size: 1.05rem;">{{ campus.subtitle }}</p>
                <p class="mt-3" style="color: rgba(255,255,255,0.6); max-width: 600px;">{{ campus.description }}</p>
            </div>
            <div class="col-lg-4 text-lg-end mt-3 mt-lg-0">
                <div class="d-inline-block text-center p-3 rounded-4" style="background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); min-width: 140px;">
                    <div style="font-size: 2.5rem; font-weight: 900; color: #fff;">{{ campus.images|length }}</div>
                    <div style="font-size: 0.8rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.5px;">Images</div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Gallery Grid -->
<section class="py-5 bg-soft">
    <div class="container">
        <div class="row g-4">
            {% for img in campus.images %}
            <div class="col-md-4 col-lg-3 fade-up">
                <div class="gallery-img" onclick="openModal('{% static "images/"|add:img %}')">
                    <img src="{% static 'images/'|add:img %}" alt="{{ campus.title }}" class="w-100" style="height: 220px; object-fit: cover;">
                    <div class="img-label"><i class="bi bi-camera me-1"></i> {{ campus.title }}</div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>

<!-- Lightbox Modal -->
<div class="modal fade" id="imageModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content bg-transparent border-0">
            <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" style="z-index: 10; font-size: 1.5rem;"></button>
            <img src="" id="modalImage" class="w-100 rounded-4 shadow-lg" style="max-height: 85vh; object-fit: contain;">
        </div>
    </div>
</div>

<script>
function openModal(src) {
    document.getElementById('modalImage').src = src;
    new bootstrap.Modal(document.getElementById('imageModal')).show();
}
</script>
{% endblock %}
