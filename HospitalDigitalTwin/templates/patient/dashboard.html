<script>
document.addEventListener('DOMContentLoaded', function () {

  function getCookie(name) {
    let cookieValue = null;

    if (document.cookie && document.cookie !== '') {
      const cookies = document.cookie.split(';');

      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();

        if (cookie.substring(0, name.length + 1) === (name + '=')) {
          cookieValue = decodeURIComponent(
            cookie.substring(name.length + 1)
          );
          break;
        }
      }
    }

    return cookieValue;
  }

  var input = document.getElementById('chatInput');
  var sendBtn = document.getElementById('chatSend');
  var messages = document.getElementById('chatMessages');

  function sendMessage() {

    var text = input.value.trim();

    if (!text) return;

    // User Message
    var userMsg = document.createElement('div');
    userMsg.className = 'insight-item';
    userMsg.style.cssText =
      'margin-bottom: 8px; background: var(--primary-bg);';

    userMsg.innerHTML =
      '<span style="font-size:13px;font-weight:500;color:var(--primary);">You:</span> ' +
      '<span style="font-size:13px;color:var(--text);">' +
      text +
      '</span>';

    messages.appendChild(userMsg);

    input.value = '';
    messages.scrollTop = messages.scrollHeight;

    // Typing Indicator
    var typing = document.createElement('div');

    typing.className = 'insight-item';
    typing.id = 'typingIndicator';

    typing.style.cssText =
      'margin-bottom:8px;background:#f8f9fa;';

    typing.innerHTML =
      '<span style="font-size:13px;color:var(--text-muted);">' +
      '<i class="bi bi-three-dots"></i> Assistant is typing...' +
      '</span>';

    messages.appendChild(typing);

    messages.scrollTop = messages.scrollHeight;

    fetch('/dashboard/patient/chat-respond/', {
      method: 'POST',

      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
        'X-CSRFToken': getCookie('csrftoken')
      },

      body: 'message=' + encodeURIComponent(text)
    })
    .then(function(response) {

      if (!response.ok) {
        throw new Error('Request failed');
      }

      return response.json();
    })
    .then(function(data) {

      var typingEl =
        document.getElementById('typingIndicator');

      if (typingEl) typingEl.remove();

      var botMsg = document.createElement('div');

      botMsg.className = 'insight-item';

      botMsg.style.cssText =
        'margin-bottom:8px;background:var(--accent-bg);';

      var responseText =
        (data.response || 'No response received.')
        .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
        .replace(/\n/g, '<br>');

      botMsg.innerHTML =
        '<span style="font-size:13px;font-weight:500;color:var(--accent);">Assistant:</span> ' +
        '<span style="font-size:13px;color:var(--text);">' +
        responseText +
        '</span>';

      messages.appendChild(botMsg);

      messages.scrollTop = messages.scrollHeight;
    })
    .catch(function(error) {

      console.error(error);

      var typingEl =
        document.getElementById('typingIndicator');

      if (typingEl) typingEl.remove();

      var errMsg = document.createElement('div');

      errMsg.className = 'insight-item';

      errMsg.style.cssText =
        'margin-bottom:8px;background:var(--error-bg);';

      errMsg.innerHTML =
        '<span style="font-size:13px;color:var(--error);">' +
        'Sorry, something went wrong. Please try again.' +
        '</span>';

      messages.appendChild(errMsg);

      messages.scrollTop = messages.scrollHeight;
    });
  }

  if (sendBtn) {
    sendBtn.addEventListener('click', sendMessage);
  }

  if (input) {
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });
  }

});
</script>
