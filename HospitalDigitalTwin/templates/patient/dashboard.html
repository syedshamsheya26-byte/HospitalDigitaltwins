{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .chat-wrapper { display: flex; flex-direction: column; height: 100vh; max-width: 768px; margin: 0 auto; }
    .chat-header { padding: 16px 20px 10px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 10px; }
    .chat-header h1 { font-size: 1.1rem; font-weight: 600; color: #111827; }
    .chat-header .sub { font-size: 0.75rem; color: #6b7280; }
    .chat-header .logout { margin-left: auto; font-size: 0.8rem; color: #9ca3af; text-decoration: none; padding: 4px 10px; border-radius: 8px; }
    .chat-header .logout:hover { background: #f3f4f6; color: #ef4444; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { display: flex; gap: 10px; max-width: 88%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot { align-self: flex-start; }
    .msg-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0; }
    .msg.user .msg-avatar { background: #0d6efd; color: #fff; }
    .msg.bot .msg-avatar { background: #10b981; color: #fff; }
    .msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 0.9rem; line-height: 1.5; color: #111827; }
    .msg.user .msg-bubble { background: #0d6efd; color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot .msg-bubble { background: #f3f4f6; border-bottom-left-radius: 4px; }
    .msg-bubble p { margin: 0; }
    .msg-bubble p + p { margin-top: 6px; }
    .chat-input-area { padding: 12px 20px 20px; border-top: 1px solid #e5e7eb; }
    .chat-input-wrap { display: flex; gap: 8px; align-items: flex-end; }
    .chat-input-wrap textarea { flex: 1; border: 1px solid #d1d5db; border-radius: 12px; padding: 12px 16px; font-size: 0.9rem; resize: none; outline: none; font-family: inherit; min-height: 48px; max-height: 120px; }
    .chat-input-wrap textarea:focus { border-color: #0d6efd; }
    .chat-input-wrap button { width: 44px; height: 44px; border-radius: 50%; border: none; background: #0d6efd; color: #fff; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .chat-input-wrap button:disabled { background: #d1d5db; }
    .typing { display: flex; gap: 4px; padding: 4px 0; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: #9ca3af; animation: pulse 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
    @media (max-width: 600px) { .msg { max-width: 95%; } .chat-messages { padding: 12px; } }
  </style>
</head>
<body>
<div class="chat-wrapper" x-data="chatApp()" x-init="init()">
  <div class="chat-header">
    <span style="font-size:1.3rem">🩺</span>
    <div>
      <h1>Health Assistant</h1>
      <div class="sub">{{ patient_name }} · {{ patient_age }} yrs · {{ patient_gender|title }}{% if patient_blood_type %} · {{ patient_blood_type }}{% endif %}</div>
    </div>
    <a href="{% url 'accounts:logout' %}" class="logout">✕</a>
  </div>

  <div class="chat-messages" x-ref="messages">
    <template x-for="(msg, i) in messages" :key="i">
      <div class="msg" :class="msg.role">
        <div class="msg-avatar" x-text="msg.role === 'user' ? 'U' : 'A'"></div>
        <div>
          <div class="msg-bubble" x-html="msg.text"></div>
          <div style="font-size:0.6rem;color:#9ca3af;margin-top:2px;text-align:right" x-text="msg.time"></div>
        </div>
      </div>
    </template>
    <div x-show="loading" class="msg bot">
      <div class="msg-avatar">A</div>
      <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>
    </div>
  </div>

  <div class="chat-input-area">
    <form class="chat-input-wrap" x-on:submit.prevent="send()">
      <textarea x-model="input" placeholder="Ask about your health..." rows="1" x-on:keydown.enter.prevent="send()" :disabled="loading"></textarea>
      <button type="submit" :disabled="!input.trim() || loading">➤</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script>
function chatApp() {
  return {
    messages: [],
    input: '',
    loading: false,
    init() {
      this.messages.push({
        role: 'bot',
        text: 'Hello {{ patient_name }}! I\'m your health assistant. Ask me about disease risks, your vitals, BMI, or any health concern.',
        time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
      });
    },
    send() {
      if (!this.input.trim() || this.loading) return;
      const userMsg = this.input.trim();
      this.messages.push({ role: 'user', text: userMsg, time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) });
      this.input = '';
      this.loading = true;
      this.$nextTick(() => this.scrollDown());
      fetch('{% url "dashboard:patient_chat_respond" %}', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-CSRFToken': '{{ csrf_token }}' },
        body: 'message=' + encodeURIComponent(userMsg)
      })
      .then(r => r.json())
      .then(data => {
        this.loading = false;
        let html = data.response.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
        this.messages.push({ role: 'bot', text: html, time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) });
        this.$nextTick(() => this.scrollDown());
      })
      .catch(() => {
        this.loading = false;
        this.messages.push({ role: 'bot', text: 'Sorry, something went wrong. Please try again.', time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) });
        this.$nextTick(() => this.scrollDown());
      });
    },
    scrollDown() { setTimeout(() => { const el = this.$refs.messages; if (el) el.scrollTop = el.scrollHeight; }, 50); }
  }
}
</script>
</body>
</html>
