{% extends 'base.html' %}
{% load static %}
{% block title %}Register - Hospital Digital Twin{% endblock %}
{% block page_title %}Register{% endblock %}

{% block content %}
<div style="max-width: 520px; margin: 0 auto;">
  <div class="card animate-up">
    <div class="card-header">
      <h5><i class="bi bi-person-plus-fill"></i> Create Account</h5>
    </div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; justify-content: center; margin-top: 8px;">
          <i class="bi bi-person-plus"></i> Register
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
