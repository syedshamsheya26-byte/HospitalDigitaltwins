{% extends 'base.html' %}
{% load static %}
{% block title %}Schedule Procedure{% endblock %}
{% block content %}
<div class="container">
    <h2 class="mb-4"><i class="bi bi-robot text-primary"></i> {{ title }}</h2>
    <div class="card shadow">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    {{ field.label_tag }}
                    {{ field }}
                    {% if field.errors %}
                    <div class="text-danger small">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Save</button>
                <a href="{% url 'robotics:procedure_list' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
