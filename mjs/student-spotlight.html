<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Spotlight — Module 6.1 Mini Project</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0f172a, #1e1b4b); min-height: 100vh; display: flex; align-items: center; font-family: 'Segoe UI', system-ui, sans-serif; }
    .spotlight-card { max-width: 500px; margin: 0 auto; border: none; border-radius: 24px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 30px 80px rgba(0,0,0,0.5); }
    .avatar-circle { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #fff; margin: 0 auto; box-shadow: 0 10px 40px rgba(99,102,241,0.3); }
    .student-field { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; }
    .student-field .label { color: #64748b; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
    .student-field .value { color: #e2e8f0; font-size: 1.1rem; font-weight: 600; }
    .glow-btn { background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; border-radius: 14px; padding: 14px 40px; font-weight: 700; font-size: 1.1rem; color: #fff; transition: all 0.3s; box-shadow: 0 8px 30px rgba(99,102,241,0.3); }
    .glow-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(99,102,241,0.5); }
    .glow-btn:active { transform: translateY(0); }
    .glow-btn:disabled { opacity: 0.5; transform: none; }
    .badge-source { font-size: 0.7rem; background: rgba(255,255,255,0.06); color: #64748b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spotlight-card p-4 text-center">
      <h2 class="fw-bold text-white mb-1">🎲 Student Spotlight</h2>
      <p class="text-muted mb-4">Fetch a random student — powered by <code>fetch()</code> + async/await</p>

      <!-- Avatar -->
      <div class="avatar-circle mb-3" id="avatar">?</div>

      <!-- Student Details -->
      <div id="student-details">
        <div class="student-field">
          <div class="label">Name</div>
          <div class="value" id="s-name">—</div>
        </div>
        <div class="student-field">
          <div class="label">Roll Number</div>
          <div class="value" id="s-roll">—</div>
        </div>
        <div class="student-field">
          <div class="label">Email</div>
          <div class="value" id="s-email">—</div>
        </div>
        <div class="student-field">
          <div class="label">Department</div>
          <div class="value" id="s-dept">—</div>
        </div>
      </div>

      <!-- Empty / Error State -->
      <div id="empty-state" class="d-none text-muted py-4">
        <p style="font-size:3rem; margin-bottom:0;">📭</p>
        <p>No students available.</p>
      </div>
      <div id="error-state" class="d-none text-danger py-4">
        <p style="font-size:3rem; margin-bottom:0;">⚠️</p>
        <p id="error-msg">Could not load students.</p>
      </div>

      <!-- Spinner -->
      <div id="spinner" class="d-none py-4">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="text-muted mt-2">Fetching student data…</p>
      </div>

      <!-- Source Badge -->
      <p class="mb-3"><span class="badge badge-source" id="source-badge">Data source: —</span></p>

      <!-- Button -->
      <button class="glow-btn" id="spotlight-btn">
        <i class="bi bi-shuffle me-2"></i>Random Spotlight
      </button>
      <p class="text-muted mt-3" style="font-size:0.8rem;">Uses <code>fetch()</code> → <code>r.ok</code> → <code>r.json()</code> — see console for full response</p>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════════════
    // Module 6.1 — fetch-powered Random Student Spotlight
    //
    // Concepts demonstrated:
    //   • fetch() + async/await + try/catch (§1.12–1.13)
    //   • r.ok check (§1.12 — fetch doesn't reject on 4xx/5xx!)
    //   • JSON.parse / JSON.stringify (§1.11)
    //   • Promise.all for parallel (count + students)
    //   • UI states: loading / success / empty / error (§2.5)
    //   • DOM manipulation: textContent, classList (§1.9)
    // ═══════════════════════════════════════════════════════════════════════

    // ── Fallback Data (used when API is unreachable) ──────────────────────
    const FALLBACK_STUDENTS = [
      { roll: "101", name: "Asha Sharma", email: "asha@college.edu", department: "Computer Science" },
      { roll: "102", name: "Vikram Reddy", email: "vikram@college.edu", department: "Electronics" },
      { roll: "103", name: "Riya Gupta", email: "riya@college.edu", department: "Computer Science" },
      { roll: "104", name: "Karan Singh", email: "karan@college.edu", department: "Mechanical" },
      { roll: "105", name: "Priya Patel", email: "priya@college.edu", department: "Civil" },
      { roll: "106", name: "Arun Kumar", email: "arun@college.edu", department: "Computer Science" },
      { roll: "107", name: "Neha Jain", email: "neha@college.edu", department: "Electronics" },
      { roll: "108", name: "Rahul Verma", email: "rahul@college.edu", department: "Mechanical" },
    ];

    // ── API endpoints to try (in order) ───────────────────────────────────
    // NOTE: To use a live API, add your endpoint URLs here, e.g.:
    //   "http://127.0.0.1:8000/api/students/"
    // Without a running server, the app falls back to built-in student data.
    const API_ENDPOINTS = ["http://127.0.0.1:8000/api/students/"];

    // ── DOM refs ─────────────────────────────────────────────────────────
    const avatar = document.getElementById("avatar");
    const sName = document.getElementById("s-name");
    const sRoll = document.getElementById("s-roll");
    const sEmail = document.getElementById("s-email");
    const sDept = document.getElementById("s-dept");
    const details = document.getElementById("student-details");
    const emptyState = document.getElementById("empty-state");
    const errorState = document.getElementById("error-state");
    const errorMsg = document.getElementById("error-msg");
    const spinner = document.getElementById("spinner");
    const sourceBadge = document.getElementById("source-badge");
    const btn = document.getElementById("spotlight-btn");

    // ── UI State Helpers ──────────────────────────────────────────────────
    function showLoading() {
      spinner.classList.remove("d-none");
      details.classList.add("d-none");
      emptyState.classList.add("d-none");
      errorState.classList.add("d-none");
      btn.disabled = true;
    }

    function hideLoading() {
      spinner.classList.add("d-none");
      btn.disabled = false;
    }

    function showStudent(student, source) {
      hideLoading();
      details.classList.remove("d-none");
      emptyState.classList.add("d-none");
      errorState.classList.add("d-none");

      sName.textContent = student.name || "—";
      sRoll.textContent = student.roll || student.roll_number || "—";
      sEmail.textContent = student.email || "—";
      sDept.textContent = student.department__name || student.department || "—";
      avatar.textContent = (student.name || "?")[0].toUpperCase();
      sourceBadge.textContent = `Data source: ${source}`;

      // Log for console inspection
      console.log("✅ Student data:", student);
    }

    function showEmpty() {
      hideLoading();
      details.classList.add("d-none");
      emptyState.classList.remove("d-none");
      errorState.classList.add("d-none");
      sourceBadge.textContent = "Data source: —";
    }

    function showError(msg) {
      hideLoading();
      details.classList.add("d-none");
      emptyState.classList.add("d-none");
      errorState.classList.remove("d-none");
      errorMsg.textContent = msg;
      sourceBadge.textContent = "Data source: error";
    }

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    // ── Fetch Students from API (with fallback) ──────────────────────────
    async function fetchStudents() {
      for (const url of API_ENDPOINTS) {
        try {
          const r = await fetch(url, { signal: AbortSignal.timeout(3000) });
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const data = await r.json();
          const list = data.results || data.students || data;
          if (Array.isArray(list) && list.length > 0) {
            console.log(`📡 Fetched from: ${url}`);
            return { students: list, source: url };
          }
        } catch (err) {
          console.warn(`⚠️  ${url} failed:`, err.message);
        }
      }
      // Fallback to local data
      console.log("📁 Using fallback data");
      return { students: FALLBACK_STUDENTS, source: "fallback (local)" };
    }

    // ── Main: Fetch → pick random → render ──────────────────────────────
    async function loadRandomStudent() {
      showLoading();
      try {
        const { students, source } = await fetchStudents();
        if (students.length === 0) {
          showEmpty();
          return;
        }
        const student = pickRandom(students);
        showStudent(student, source);
      } catch (err) {
        showError(`Network error: ${err.message}`);
      }
    }

    // ── Button Listener ──────────────────────────────────────────────────
    document.getElementById("spotlight-btn").addEventListener("click", loadRandomStudent);

    // ── Load one on page load ────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", loadRandomStudent);
  </script>
</body>
</html>
