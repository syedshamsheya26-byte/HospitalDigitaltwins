<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App — Module 6.1 Mini Project</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; }
    .quiz-card { max-width: 600px; margin: 0 auto; border: none; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
    .option-btn { display: block; width: 100%; text-align: left; padding: 12px 20px; margin-bottom: 8px; border-radius: 12px; border: 2px solid #e2e8f0; background: #fff; transition: all 0.2s; font-size: 1.05rem; }
    .option-btn:hover:not(:disabled) { border-color: #6366f1; background: #eef2ff; }
    .option-btn.selected { border-color: #6366f1; background: #eef2ff; }
    .option-btn.correct { border-color: #22c55e; background: #dcfce7; }
    .option-btn.wrong { border-color: #ef4444; background: #fee2e2; }
    .badge-question { background: #6366f1; color: #fff; padding: 4px 14px; border-radius: 20px; font-size: 0.85rem; }
    .progress-bar-custom { height: 8px; border-radius: 4px; background: #e2e8f0; }
    .progress-bar-custom .fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #6366f1, #8b5cf6); transition: width 0.3s; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card quiz-card p-4">
      <div id="quiz-app">
        <!-- Start Screen -->
        <div id="start-screen" class="text-center">
          <h2 class="fw-bold mb-2">JavaScript Quiz</h2>
          <p class="text-muted">Test your JS basics — 5 questions</p>
          <button class="btn btn-primary btn-lg px-5 mt-3" id="start-btn">Start Quiz</button>
        </div>

        <!-- Question Screen -->
        <div id="question-screen" class="d-none">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="badge-question" id="q-number">1 / 5</span>
            <span class="fw-bold text-muted">Score: <span id="score-display">0</span></span>
          </div>
          <div class="progress-bar-custom mb-4"><div class="fill" id="progress-fill" style="width:0%"></div></div>
          <h4 class="fw-semibold mb-4" id="question-text">Loading…</h4>
          <div id="options-container"></div>
          <div class="text-center mt-4">
            <button class="btn btn-outline-secondary px-4 d-none" id="next-btn">Next →</button>
          </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="d-none text-center">
          <div id="result-icon" class="mb-3" style="font-size:4rem;">🎉</div>
          <h2 class="fw-bold" id="result-title">Great Job!</h2>
          <p class="text-muted fs-5" id="result-text">You scored 4 out of 5</p>
          <div class="progress-bar-custom mb-4 mx-auto" style="max-width:300px"><div class="fill" id="result-bar" style="width:80%"></div></div>
          <p class="text-muted" id="result-feedback">Excellent!</p>
          <button class="btn btn-primary px-5 mt-2" id="restart-btn">Try Again</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Questions Array ──────────────────────────────────────────────────
    const questions = [
      {
        question: "Which keyword declares a block-scoped variable that cannot be reassigned?",
        options: ["var", "let", "const", "static"],
        correct: 2,
      },
      {
        question: "What does '5' + 1 evaluate to?",
        options: ["6", "'51'", "NaN", "Error"],
        correct: 1,
      },
      {
        question: "Which array method returns a NEW array with transformed elements?",
        options: ["filter", "reduce", "map", "forEach"],
        correct: 2,
      },
      {
        question: "How do you stop a form from reloading the page?",
        options: ["stopPropagation()", "preventDefault()", "halt()", "return false"],
        correct: 1,
      },
      {
        question: "Which method converts a JSON string into a JavaScript object?",
        options: ["JSON.stringify()", "JSON.parse()", "JSON.convert()", "JSON.toObject()"],
        correct: 1,
      },
    ];

    // ── State ────────────────────────────────────────────────────────────
    let current = 0;
    let score = 0;
    let answered = false;
    let answers = []; // track all answers for reduce-based scoring

    const startScreen = document.getElementById("start-screen");
    const questionScreen = document.getElementById("question-screen");
    const resultScreen = document.getElementById("result-screen");
    const qNumber = document.getElementById("q-number");
    const progressFill = document.getElementById("progress-fill");
    const questionText = document.getElementById("question-text");
    const optionsContainer = document.getElementById("options-container");
    const scoreDisplay = document.getElementById("score-display");
    const nextBtn = document.getElementById("next-btn");

    // ── Render Question ──────────────────────────────────────────────────
    function renderQuestion() {
      const q = questions[current];
      answered = false;
      nextBtn.classList.add("d-none");
      qNumber.textContent = `${current + 1} / ${questions.length}`;
      progressFill.style.width = `${((current) / questions.length) * 100}%`;
      questionText.textContent = q.question;

      optionsContainer.innerHTML = q.options
        .map((opt, i) => `<button class="option-btn" data-index="${i}">${opt}</button>`)
        .join("");
    }

    // ── Handle Answer (event delegation — §1.10) ────────────────────────
    function handleOptionClick(e) {
      const btn = e.target.closest(".option-btn");
      if (!btn || answered) return;

      answered = true;
      const selected = parseInt(btn.dataset.index);
      const correct = questions[current].correct;
      const isCorrect = selected === correct;

      if (isCorrect) score++;
      scoreDisplay.textContent = score;

      answers[current] = isCorrect;

      // Highlight correct/wrong using classList
      document.querySelectorAll(".option-btn").forEach((opt, i) => {
        opt.disabled = true;
        if (i === correct) opt.classList.add("correct");
        if (i === selected && !isCorrect) opt.classList.add("wrong");
      });

      nextBtn.classList.remove("d-none");
      if (current === questions.length - 1) {
        nextBtn.textContent = "See Results";
      }
    }

    // ── Next Question ────────────────────────────────────────────────────
    function goNext() {
      current++;
      if (current >= questions.length) {
        showResults();
      } else {
        renderQuestion();
      }
    }

    // ── Results (using reduce for score) ─────────────────────────────────
    function showResults() {
      questionScreen.classList.add("d-none");
      resultScreen.classList.remove("d-none");

      // Calculate score via reduce on the answers array
      const total = questions.length;
      const computedScore = answers.reduce((sum, correct) => sum + (correct ? 1 : 0), 0);
      score = computedScore;
      const pct = (score / total) * 100;

      document.getElementById("score-display").textContent = score;
      document.getElementById("result-text").textContent = `You scored ${score} out of ${total}`;
      document.getElementById("result-bar").style.width = `${pct}%`;
      console.log(`📊 Score via reduce: ${score}/${total}`);

      const feedback = score === total ? "Perfect score! You're a JS master! 🏆" :
                        score >= total * 0.6 ? "Great job! Keep practicing. 👍" :
                        "Keep studying — you'll get there! 💪";
      document.getElementById("result-feedback").textContent = feedback;
      document.getElementById("result-icon").textContent = score === total ? "🏆" :
                                                          score >= total * 0.6 ? "🎉" : "📚";
    }

    // ── Restart ──────────────────────────────────────────────────────────
    function restart() {
      current = 0;
      score = 0;
      answered = false;
      answers = [];
      resultScreen.classList.add("d-none");
      startScreen.classList.remove("d-none");
    }

    // ── Event Listeners ──────────────────────────────────────────────────
    document.getElementById("start-btn").addEventListener("click", () => {
      startScreen.classList.add("d-none");
      questionScreen.classList.remove("d-none");
      renderQuestion();
    });

    // Delegation: one listener on the container for all option buttons
    optionsContainer.addEventListener("click", handleOptionClick);

    nextBtn.addEventListener("click", goNext);
    document.getElementById("restart-btn").addEventListener("click", restart);
  </script>
</body>
</html>
